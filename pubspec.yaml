name: appcraft_phone_util_flutter
description: >-
  Flutter library for phone number parsing, validation, formatting,
  country detection (200+ countries) and input masking via
  ACPhoneInputFormatter and ACPhoneEditingController.

version: 1.2.0

repository: https://github.com/AppCraftTeam/appcraft-phone-util-flutter
homepage: https://github.com/AppCraftTeam/appcraft-phone-util-flutter
issue_tracker: https://github.com/AppCraftTeam/appcraft-phone-util-flutter/issues

topics:
  - phone
  - input
  - formatter
  - validation

environment:
  sdk: '>=2.14.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
